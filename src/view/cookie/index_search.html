<form class="layui-form layui-form-pane form-search" action="{:sysuri()}" onsubmit="return false" method="get" autocomplete="off">
 <fieldset>
  <legend>{:lang('条件搜索')}</legend>

  <div class="layui-form-item layui-inline">
   <label class="layui-form-label">{:lang('关键词')}</label>
   <div class="layui-input-inline">
    <input name="name" value="{$get.name|default=''}" placeholder="{:lang('名称/账号')}" class="layui-input">
   </div>
  </div>

  <div class="layui-form-item layui-inline">
   <label class="layui-form-label">{:lang('平台')}</label>
   <div class="layui-input-inline">
    <select name="platform" class="layui-select" lay-append-to>
     <option value="">-- {:lang('全部')} --</option>
     {foreach $platforms as $k => $v}
     <option value="{$k}" {if isset($get.platform) && $get.platform == $k}selected{/if}>{$v.label}</option>
     {/foreach}
    </select>
   </div>
  </div>

  <div class="layui-form-item layui-inline">
   <label class="layui-form-label">{:lang('状态')}</label>
   <div class="layui-input-inline">
    <select name="status" class="layui-select" lay-append-to>
     <option value="">-- {:lang('全部')} --</option>
     <option value="1" {if isset($get.status) && $get.status == '1'}selected{/if}>{:lang('启用')}</option>
     <option value="0" {if isset($get.status) && $get.status == '0'}selected{/if}>{:lang('禁用')}</option>
    </select>
   </div>
  </div>

  <div class="layui-form-item layui-inline">
   <button class="layui-btn layui-btn-primary"><i class="layui-icon layui-icon-search"></i> {:lang('搜 索')}</button>
  </div>

 </fieldset>
</form>

<!-- 平台类型数据（供 JS 使用） -->
<label class="layui-hide">
 <textarea id="PlatformTypesData">{:json_encode($platforms, JSON_UNESCAPED_UNICODE)}</textarea>
</label>
<label class="layui-hide">
 <textarea id="ChannelTypesData">{:json_encode($channels, JSON_UNESCAPED_UNICODE)}</textarea>
</label>
